<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0"
    />
    <title>ПриДел</title>
    <meta name="application-name" content="ПриДел" />
    <meta name="apple-mobile-web-app-title" content="ПриДел" />
    <meta
      name="description"
      content="ПриДел от 4-2 — лёгкий супер-интерфейс для заявок, мастеров и рабочего пространства."
    />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%230f172a'/%3E%3Cstop offset='100%25' stop-color='%231d4ed8'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='18' fill='url(%23g)'/%3E%3Cpath d='M20 20h12c8.837 0 16 7.163 16 16v8H36V36c0-2.21-1.79-4-4-4H20V20zm0 16h12v8H20v-8z' fill='%23f8fafc'/%3E%3C/svg%3E"
    />
    <script src="https://st.max.ru/js/max-web-app.js"></script>
    <script>
      (function () {
        var rawHash = window.location.hash ? window.location.hash.slice(1) : "";
        if (rawHash) {
          var params = new URLSearchParams(rawHash);
          var initData =
            params.get("WebAppData") ||
            params.get("tgWebAppData") ||
            params.get("init_data") ||
            params.get("initData") ||
            "";
          if (initData) {
            window.sessionStorage.setItem("pridel.launchData", initData);
            window.history.replaceState(null, "", window.location.pathname + window.location.search);
          }
        }

        try {
          if (window.WebApp && typeof window.WebApp.ready === "function") {
            window.WebApp.ready();
          }
        } catch (error) {
          console.warn("MAX ready bootstrap failed", error);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
