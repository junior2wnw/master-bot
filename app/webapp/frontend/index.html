<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0"
    />
    <title>ПриДел</title>
    <meta name="application-name" content="ПриДел" />
    <meta name="apple-mobile-web-app-title" content="ПриДел" />
    <meta
      name="description"
      content="ПриДел от 4-2 — лёгкий супер-интерфейс для заявок, мастеров и рабочего пространства."
    />
    <script src="https://st.max.ru/js/max-web-app.js"></script>
    <script>
      (function () {
        var rawHash = window.location.hash ? window.location.hash.slice(1) : "";
        if (rawHash) {
          var params = new URLSearchParams(rawHash);
          var initData =
            params.get("WebAppData") ||
            params.get("tgWebAppData") ||
            params.get("init_data") ||
            params.get("initData") ||
            "";
          if (initData) {
            window.sessionStorage.setItem("pridel.launchData", initData);
            window.history.replaceState(null, "", window.location.pathname + window.location.search);
          }
        }

        try {
          if (window.WebApp && typeof window.WebApp.ready === "function") {
            window.WebApp.ready();
          }
        } catch (error) {
          console.warn("MAX ready bootstrap failed", error);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
