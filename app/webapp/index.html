<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>МастерБот</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>
<!-- ─── App Shell ─── -->
<div id="app" class="app">
  <!-- Header -->
  <header id="header" class="header">
    <div class="header-left">
      <button id="btn-back" class="btn-icon hidden" onclick="goBack()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
    </div>
    <h1 id="header-title" class="header-title">МастерБот</h1>
    <div class="header-right">
      <button id="btn-notifications" class="btn-icon" onclick="showNotifications()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
        <span id="notif-badge" class="badge hidden">0</span>
      </button>
    </div>
  </header>

  <!-- Toast -->
  <div id="toast" class="toast hidden"></div>

  <!-- Screens (only one visible at a time) -->
  <main id="main" class="main">

    <!-- Dashboard -->
    <section id="screen-dashboard" class="screen active">
      <div class="dashboard">
        <div class="greeting">
          <h2 id="dash-name"></h2>
          <p class="text-muted" id="dash-subtitle"></p>
        </div>
        <div id="dash-stats" class="stat-grid"></div>
        <div id="dash-actions" class="action-grid"></div>
      </div>
    </section>

    <!-- Search -->
    <section id="screen-search" class="screen">
      <div class="search-box">
        <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        <input id="search-input" type="text" placeholder="Розетка, люстра, смеситель..." autocomplete="off">
        <button id="search-clear" class="btn-icon hidden" onclick="clearSearch()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <div id="search-results" class="item-list"></div>
      <div id="search-empty" class="empty-state hidden">
        <p>Ничего не найдено</p>
        <p class="text-muted">Попробуйте другие слова</p>
      </div>
      <div id="search-hint" class="empty-state">
        <p class="text-muted">Введите название работы</p>
        <div id="popular-tags" class="tag-list"></div>
      </div>
    </section>

    <!-- Catalog -->
    <section id="screen-catalog" class="screen">
      <div id="catalog-content"></div>
    </section>

    <!-- Item Detail -->
    <section id="screen-item" class="screen">
      <div id="item-detail"></div>
    </section>

    <!-- Estimates List -->
    <section id="screen-estimates" class="screen">
      <div id="estimates-list"></div>
    </section>

    <!-- Estimate Detail (Cart) -->
    <section id="screen-estimate" class="screen">
      <div id="estimate-detail"></div>
    </section>

    <!-- Orders -->
    <section id="screen-orders" class="screen">
      <div id="orders-list"></div>
    </section>

    <!-- Order Detail -->
    <section id="screen-order" class="screen">
      <div id="order-detail"></div>
    </section>

    <!-- Earnings -->
    <section id="screen-earnings" class="screen">
      <div id="earnings-content"></div>
    </section>

    <!-- Approvals -->
    <section id="screen-approvals" class="screen">
      <div id="approvals-list"></div>
    </section>

    <!-- Analytics (Owner/Admin) -->
    <section id="screen-analytics" class="screen">
      <div id="analytics-content"></div>
    </section>

    <!-- Notifications -->
    <section id="screen-notifications" class="screen">
      <div id="notifications-list"></div>
    </section>

    <section id="screen-suggestions" class="screen">
      <div id="suggestions-content"></div>
    </section>

    <!-- Profile -->
    <section id="screen-profile" class="screen">
      <div id="profile-content"></div>
    </section>

    <!-- Profile Editor -->
    <section id="screen-profile-edit" class="screen">
      <div id="profile-edit-content"></div>
    </section>

    <!-- QR Payment Viewer -->
    <section id="screen-qr" class="screen">
      <div id="qr-content"></div>
    </section>

  </main>

  <!-- Bottom Tab Bar -->
  <nav id="tabbar" class="tabbar">
    <button class="tab active" data-tab="dashboard" onclick="navigate('dashboard')">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>Главная</span>
    </button>
    <button class="tab" data-tab="search" onclick="navigate('search')">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      <span>Поиск</span>
    </button>
    <button class="tab" data-tab="catalog" onclick="navigate('catalog')">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      <span>Каталог</span>
    </button>
    <button id="tab-estimates" class="tab hidden" data-tab="estimates" onclick="navigate('estimates')">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      <span>Сметы</span>
    </button>
    <button class="tab" data-tab="profile" onclick="navigate('profile')">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span>Ещё</span>
    </button>
  </nav>

  <!-- Floating Cart Button -->
  <button id="fab-cart" class="fab hidden" onclick="navigate('estimate', {id: state.activeEstimateId})">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg>
    <span id="fab-count">0</span>
  </button>
</div>

<!-- Loading Overlay -->
<div id="loader" class="loader">
  <div class="spinner"></div>
</div>

<script src="app.js"></script>
</body>
</html>
