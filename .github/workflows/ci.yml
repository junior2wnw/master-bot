name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  PYTHON_VERSION: "3.12"
  APP_ENV: test
  DATABASE_URL: "postgresql+asyncpg://masterbot:masterbot@localhost:5432/masterbot_test"
  DATABASE_URL_SYNC: "postgresql://masterbot:masterbot@localhost:5432/masterbot_test"
  REDIS_URL: "redis://localhost:6379/0"
  AI_PROVIDER: disabled
  BOT_TOKEN: test_token
  APP_SECRET_KEY: test-secret-key

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check
        run: ruff check app/ tests/ scripts/

      - name: Ruff format check
        run: ruff format --check app/ tests/ scripts/

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest tests/ -q --tb=short

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: masterbot
          POSTGRES_PASSWORD: masterbot
          POSTGRES_DB: masterbot_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run migrations
        run: python -m alembic upgrade head

      - name: Run seed
        run: python -m scripts.seed

      - name: Run integration tests
        run: pytest tests/ -q --tb=short -m "integration or not integration"

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t masterbot:test .

      - name: Verify image
        run: docker run --rm masterbot:test python -c "import app; print('OK')"
